name: publish-package

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Approved tag to publish, for example v0.1.5"
        required: true
        type: string
      confirm_publish:
        description: "Type exactly: publish <tag>"
        required: true
        type: string

permissions:
  contents: read

jobs:
  build:
    if: startsWith(inputs.tag, 'v') && inputs.confirm_publish == format('publish {0}', inputs.tag)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag }}
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Verify checkout is the approved tag
        run: |
          set -euo pipefail
          head_sha="$(git rev-parse HEAD)"
          tag_sha="$(git rev-parse "refs/tags/${APV_TAG}^{commit}")"
          if [ "$head_sha" != "$tag_sha" ]; then
            echo "HEAD does not match refs/tags/${APV_TAG}" >&2
            exit 1
          fi
          echo "checkout matches refs/tags/${APV_TAG}: ${head_sha}"
        env:
          APV_TAG: ${{ inputs.tag }}
      - name: Install build tools
        run: python -m pip install --upgrade pip build twine
      - name: Verify approved tag matches package version
        run: |
          python - <<'PY'
          from pathlib import Path
          import os
          import tomllib

          tag = os.environ["APV_TAG"]
          version = tomllib.loads(Path("pyproject.toml").read_text())["project"]["version"]
          expected = f"v{version}"
          if tag != expected:
              raise SystemExit(f"tag/version mismatch: tag={tag!r}, expected={expected!r}")
          print(f"tag/version match: {tag}")
          PY
        env:
          APV_TAG: ${{ inputs.tag }}
      - name: Verify version is not already on PyPI
        run: |
          python - <<'PY'
          from pathlib import Path
          from urllib.error import HTTPError
          from urllib.request import Request, urlopen
          import tomllib

          project = tomllib.loads(Path("pyproject.toml").read_text())["project"]
          name = project["name"]
          version = project["version"]
          url = f"https://pypi.org/pypi/{name}/{version}/json"
          request = Request(url, headers={"User-Agent": "agent-personal-vault-release-check"})
          try:
              with urlopen(request, timeout=20):
                  raise SystemExit(f"PyPI already has {name}=={version}; stop before publish")
          except HTTPError as exc:
              if exc.code == 404:
                  print(f"PyPI does not have {name}=={version}")
              else:
                  raise
          PY
      - name: Build distributions
        run: python -m build
      - name: Check distributions
        run: twine check dist/*
      - name: Strict forbidden-file scan
        run: |
          python - <<'PY'
          from __future__ import annotations

          import tarfile
          import zipfile
          from pathlib import Path

          forbidden_names = {
              ".env",
              ".pypirc",
              "audit.jsonl",
              "consents.json",
              "vault.json",
          }
          forbidden_suffixes = {
              ".db",
              ".heic",
              ".jpeg",
              ".jpg",
              ".png",
              ".sqlite",
          }
          forbidden_text = [
              "/" + "Users/",
              "private/" + "job_profile",
              "personal-ai" + "-os",
              "kishimoto" + "satoshi",
          ]
          text_suffixes = {".cfg", ".json", ".md", ".py", ".toml", ".txt", ".yaml", ".yml"}

          def fail(message: str) -> None:
              raise SystemExit(message)

          def check_entry(name: str, data: bytes | None = None) -> None:
              parts = [part for part in Path(name).parts if part not in {"", "."}]
              if any(part in forbidden_names for part in parts):
                  fail(f"forbidden artifact entry name: {name}")
              if Path(name).suffix.lower() in forbidden_suffixes:
                  fail(f"forbidden artifact entry suffix: {name}")
              if data is not None and Path(name).suffix.lower() in text_suffixes:
                  text = data.decode("utf-8", errors="ignore")
                  for needle in forbidden_text:
                      if needle in text:
                          fail(f"forbidden artifact text in {name}: {needle}")

          artifacts = sorted(Path("dist").glob("*"))
          if not artifacts:
              fail("no artifacts found")

          for artifact in artifacts:
              if artifact.suffix == ".whl":
                  with zipfile.ZipFile(artifact) as wheel:
                      for info in wheel.infolist():
                          if info.is_dir():
                              continue
                          data = wheel.read(info.filename)
                          check_entry(info.filename, data)
              elif artifact.name.endswith(".tar.gz"):
                  with tarfile.open(artifact, "r:gz") as sdist:
                      for member in sdist.getmembers():
                          if not member.isfile():
                              continue
                          extracted = sdist.extractfile(member)
                          data = extracted.read() if extracted is not None else b""
                          check_entry(member.name, data)
              else:
                  fail(f"unexpected artifact type: {artifact}")
              print(f"artifact scan passed: {artifact}")
          PY
      - name: Upload distributions for environment approval
        uses: actions/upload-artifact@v5
        with:
          name: dist
          path: dist/*
          if-no-files-found: error
          retention-days: 7

  publish:
    needs: build
    if: startsWith(inputs.tag, 'v') && inputs.confirm_publish == format('publish {0}', inputs.tag)
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/agent-personal-vault/
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v6
        with:
          name: dist
          path: dist
      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
